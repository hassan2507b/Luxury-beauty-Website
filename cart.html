<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | Glow Theory</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { overflow-x: hidden; }
        body { background-color: #fff; color: #333; overflow-x: hidden; width: 100%; }
        img { max-width: 100%; }

        /* --- PREMIUM NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 8%; background: rgba(255, 255, 255, 0.98);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(183, 110, 121, 0.15); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            flex-wrap: wrap;
        }
        .logo-container img { height: 55px; transition: 0.3s; cursor: pointer; }
        .logo-container img:hover { transform: scale(1.05); }

        .nav-links { list-style: none; display: flex; gap: 35px; align-items: center; }
        .nav-links a {
            text-decoration: none; color: #333; font-weight: 500; font-size: 13px;
            letter-spacing: 1px; text-transform: uppercase; transition: 0.3s;
        }
        .nav-links a:hover { color: #b76e79; }

        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            background: #fff; min-width: 200px; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid rgba(183, 110, 121, 0.12);
            padding: 10px 0; z-index: 1001;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { padding: 12px 20px; font-size: 13px; display: block; text-decoration: none; color: #555; }
        .dropdown-content a:hover { background: #fbf3f4; color: #a65d67; padding-left: 25px; }

        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .cart-icon-container { text-decoration: none; color: #333; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .cart-count { color: #a65d67; font-weight: 700; }

        /* Burger menu button - hidden on desktop by default */
        .burger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1100;
        }
        .navbar .burger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: #333;
            border-radius: 2px;
            transition: 0.3s ease;
        }
        .navbar .burger.toggle span {
            background-color: #d4a373;
        }
        .burger.toggle .line1 { transform: translateY(8px) rotate(45deg); }
        .burger.toggle .line2 { opacity: 0; }
        .burger.toggle .line3 { transform: translateY(-8px) rotate(-45deg); }

        .cart-header {
            padding: 80px 8% 40px;
            background: linear-gradient(to bottom, #fff5f6, #ffffff);
            text-align: center;
        }
        .cart-header h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 10px; }
        .cart-header a { color: #a65d67; text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .main-wrapper {
            max-width: 1200px; margin: 40px auto 100px; padding: 0 8%;
            display: grid; grid-template-columns: 1.8fr 1fr; gap: 60px;
        }

        .cart-list { border-top: 1px solid #f2f2f2; }
        .empty-msg { padding: 60px 0; color: #999; font-style: italic; text-align: center; grid-column: span 2; }

        .cart-item {
            display: grid; grid-template-columns: 100px 1fr auto auto;
            align-items: center; gap: 25px; padding: 25px 0;
            border-bottom: 1px solid #f2f2f2;
        }
        .cart-item img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; background: #f9f9f9; }
        
        .item-info h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 5px; }
        .remove-link { font-size: 11px; color: #a65d67; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: inline-block; font-weight: 700; }
        .remove-link:hover { color: #333; }

        .qty-controls {
            display: flex; align-items: center; gap: 15px; border: 1px solid #eee;
            padding: 5px 15px; border-radius: 50px; background: #fff;
        }
        .qty-btn { cursor: pointer; font-weight: bold; color: #a65d67; user-select: none; }
        .item-price { font-weight: 600; font-size: 16px; color: #222; min-width: 100px; text-align: right; }

        .summary-card {
            background: #fff; padding: 40px; border-radius: 30px;
            border: 1px solid #f5ecee; height: fit-content;
            box-shadow: 0 20px 40px rgba(166, 93, 103, 0.05);
            position: sticky; top: 120px;
        }
        .summary-card h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .total-row { margin-top: 20px; padding-top: 20px; border-top: 2px solid #f5ecee; font-weight: 700; font-size: 18px; color: #a65d67; }

        .btn-checkout {
            width: 100%; padding: 20px; background: #333; color: #fff;
            border: none; border-radius: 50px; text-transform: uppercase;
            font-weight: 600; letter-spacing: 2px; cursor: pointer;
            margin-top: 30px; transition: 0.4s;
        }
        .btn-checkout:hover { background: #a65d67; }

        /* ================================================= */
        /* ================ RESPONSIVE RULES ================ */
        /* ================================================= */

        @media (max-width: 968px) {
            .navbar { padding: 12px 5%; }

            .burger { display: flex; }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 75%;
                max-width: 320px;
                height: 100vh;
                background: #fff;
                flex-direction: column;
                align-items: flex-start;
                gap: 0;
                padding: 100px 30px 30px;
                transition: right 0.4s ease;
                box-shadow: -10px 0 40px rgba(0,0,0,0.15);
                overflow-y: auto;
            }
            .nav-links.active { right: 0; }
            .nav-links li { width: 100%; padding: 14px 0; border-bottom: 1px solid #f2f2f2; }
            .nav-links a { font-size: 14px; }

            .dropdown-content {
                position: static;
                display: none;
                box-shadow: none;
                border: none;
                background: transparent;
                padding-left: 10px;
            }
            .dropdown.active .dropdown-content { display: block; }
            .dropdown-content a { padding: 10px 0; }

            .cart-header { padding: 60px 6% 30px; }
            .cart-header h1 { font-size: 36px; }
        }

        @media (max-width: 900px) { 
            .main-wrapper { grid-template-columns: 1fr; padding: 0 6%; gap: 40px; } 
            .cart-item { grid-template-columns: 80px 1fr; row-gap: 12px; }
            .qty-controls, .item-price { grid-column: 2; justify-self: start; }
            .item-price { text-align: left; margin-top: -5px; }
            .summary-card { position: static; padding: 30px; }
        }

        @media (max-width: 640px) {
            .logo-container img { height: 42px; }
            .cart-header h1 { font-size: 28px; }
            .cart-item { grid-template-columns: 70px 1fr; gap: 15px; padding: 18px 0; }
            .cart-item img { height: 90px; }
            .item-info h3 { font-size: 15px; }
            .qty-controls { padding: 5px 12px; gap: 10px; }
            .summary-card { padding: 25px 20px; border-radius: 20px; }
            .btn-checkout { padding: 16px; letter-spacing: 1px; }
        }

        @media (max-width: 400px) {
            .nav-links { width: 85%; }
            .cart-item { grid-template-columns: 60px 1fr; }
        }
    </style>
    <link rel="stylesheet" href="luxury-style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Glow Theory Logo">
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
                <a href="skin care.html">Skin Care</a>
                <div class="dropdown-content">
                    <a href="skin care.html">✨ All Products</a>
                    <a href="serums.html">🧪 Serums</a>
                    <a href="cleanser.html">🧼 Cleansers</a>
                    <a href="Moisturizers.html">💧 Moisturizers</a>
                </div>
            </li>
            <li><a href="luxlips.html">Luxe Lips</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <a href="cart.html" class="cart-icon-container">
                🛒 <span class="cart-count" id="cart-count">0</span>
            </a>
            <button class="burger" id="burger-menu" aria-label="Toggle Navigation Menu">
                <span class="line1"></span>
                <span class="line2"></span>
                <span class="line3"></span>
            </button>
        </div>
    </nav>

    <section class="cart-header">
        <h1>Your Bag</h1>
        <a href="skin care.html">← Continue Shopping</a>
    </section>

    <div class="main-wrapper" id="cart-wrapper">
        <div class="cart-list" id="cart-items-container">
            </div>

        <div class="summary-card" id="summary-card">
            <h2>Summary</h2>
            <div class="row"><span>Subtotal</span><span id="subtotal">Rs. 0</span></div>
            <div class="row"><span>Shipping</span><span>FREE</span></div>
            <div class="row total-row"><span>Total</span><span id="final-total">Rs. 0</span></div>
            
            <button class="btn-checkout" onclick="checkoutAlert()">Checkout Now</button>
        </div>
    </div>

    <script>
        function displayCart() {
            let cart = JSON.parse(localStorage.getItem('glowCart')) || [];
            const container = document.getElementById('cart-items-container');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="empty-msg">Your bag is currently empty. Start adding some glow!</p>';
                document.getElementById('subtotal').innerText = "Rs. 0";
                document.getElementById('final-total').innerText = "Rs. 0";
                return;
            }

            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                let itemTotal = item.price * item.quantity;
                total += itemTotal;

                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <span class="remove-link" onclick="removeItem(${index})">Remove from Bag</span>
                        </div>
                        <div class="qty-controls">
                            <span class="qty-btn" onclick="changeQty(${index}, -1)">−</span>
                            <span>${item.quantity}</span>
                            <span class="qty-btn" onclick="changeQty(${index}, 1)">+</span>
                        </div>
                        <div class="item-price">Rs. ${itemTotal.toLocaleString()}</div>
                    </div>
                `;
            });

            document.getElementById('subtotal').innerText = "Rs. " + total.toLocaleString();
            document.getElementById('final-total').innerText = "Rs. " + total.toLocaleString();
        }

        function changeQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('glowCart'));
            
            // Agar qty 1 hai aur user minus dabaye, toh confirmation lein
            if (cart[index].quantity === 1 && delta === -1) {
                removeItem(index);
            } else {
                cart[index].quantity += delta;
                localStorage.setItem('glowCart', JSON.stringify(cart));
                displayCart();
            }
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('glowCart'));
            let productName = cart[index].name;

            // Are you sure alert
            let confirmDelete = confirm("Are you sure you want to remove '" + productName + "' from your bag?");
            
            if (confirmDelete) {
                cart.splice(index, 1);
                localStorage.setItem('glowCart', JSON.stringify(cart));
                displayCart();
            }
        }

        function checkoutAlert() {
            let cart = JSON.parse(localStorage.getItem('glowCart')) || [];
            if(cart.length > 0) {
                alert("Thank you for your order! Proceeding to Payment...");
            } else {
                alert("Your bag is empty!");
            }
        }

        window.onload = displayCart;

        // --- MOBILE NAV / BURGER MENU SCRIPT ---
        const burger = document.getElementById('burger-menu');
        const navLinks = document.getElementById('nav-links');

        if (burger && navLinks) {
            burger.addEventListener('click', () => {
                burger.classList.toggle('toggle');
                navLinks.classList.toggle('active');
            });

            // Tap-to-toggle dropdown on mobile (hover doesn't work on touch)
            document.querySelectorAll('.nav-links .dropdown > a').forEach(link => {
                link.addEventListener('click', (e) => {
                    if (window.innerWidth <= 968) {
                        e.preventDefault();
                        link.parentElement.classList.toggle('active');
                    }
                });
            });

            // Close menu when a normal link is tapped
            document.querySelectorAll('.nav-links a:not(.dropdown > a)').forEach(link => {
                link.addEventListener('click', () => {
                    burger.classList.remove('toggle');
                    navLinks.classList.remove('active');
                });
            });
        }
    </script>
    <script src="luxury-script.js"></script>
</body>
</html>
